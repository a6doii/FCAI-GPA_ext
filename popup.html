<!DOCTYPE html>
<html>
<head>
  <title>FCAI GPA Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 260px;
      padding: 10px;
      background: #f4f4f4;
    }
    h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background: #4CAF50;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      font-size: 14px;
    }
    button:hover {
      background: #45a049;
    }
    #refreshBtn {
      background: #2196F3;
    }
    #refreshBtn:hover {
      background: #1976D2;
    }
    #result {
      margin-top: 15px;
      padding: 10px;
      background: white;
      border-radius: 5px;
      font-size: 14px;
    }
    small {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: gray;
    }
  </style>
</head>
<body>
  <h2>GPA Calculator</h2>
  <button id="calcBtn">Calculate GPA</button>
  <button id="refreshBtn">Refresh</button>
  <div id="result"></div>
  <small>By AlHussain Abdo @2025</small>
  <script src="popup.js"></script>
</body>
</html>
